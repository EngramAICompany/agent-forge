name: wiki-e2e

# wiki_sync 가 위키를 갱신한 직후 위키 상태를 검증. 결정 공간 0 → 순수 bash.
# 같은 sed 어댑터 결과·HTTP 응답 코드만 보면 모든 predicate 가 결정론적.
#
# 이 yaml의 책임:
#   - trigger 정의 (wiki-sync workflow_run + dispatch + 주간 schedule)
#   - main 체크아웃 + 위키 fresh clone
#   - 환경변수(WIKI_DIR / WIKI_URL / MAIN_DIR) 주입
#   - 검증 스크립트 실행
# 이 yaml의 비책임: 어떤 predicate 를 어떻게 평가할지 — 그건 wiki-e2e-check.sh + wiki_e2e.md.

on:
  workflow_run:
    workflows: [wiki-sync]
    types: [completed]
  workflow_dispatch:
  schedule:
    # 주 1회 (월요일 09:00 UTC) drift 캐치 — wiki_sync 외부에서 위키가 편집되거나
    # 외부 요인으로 페이지가 사라진 경우.
    - cron: '0 9 * * 1'

# 검증 전용 모듈. commit·PR·리뷰 모두 안 함.
permissions:
  contents: read

concurrency:
  group: wiki-e2e
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # workflow_run 의 경우 트리거 워크플로가 성공했을 때만 실행. dispatch·schedule 은 항상.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: checkout main
        uses: actions/checkout@v4
        with:
          path: main

      - name: clone wiki (read-only)
        run: |
          set -euo pipefail
          git clone --quiet --depth=1 \
            "https://github.com/${{ github.repository }}.wiki.git" \
            wiki

      - name: run wiki-e2e checks
        env:
          MAIN_DIR: ${{ github.workspace }}/main
          WIKI_DIR: ${{ github.workspace }}/wiki
          WIKI_URL: https://github.com/${{ github.repository }}/wiki
        run: bash main/.github/scripts/wiki-e2e-check.sh
