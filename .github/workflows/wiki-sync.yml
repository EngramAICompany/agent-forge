name: wiki-sync

# main → wiki 단방향 동기화. 결정론적 bash로 구현 (LLM 없음).
#
# 이 yaml의 책임:
#   - trigger 정의
#   - source/wiki 체크아웃
#   - lazy gate (diff 없으면 sync 스킵)
#   - overlay + commit + push
#   - 결정 로그를 job summary로 노출
# 이 yaml의 비책임:
#   - MD_FILES 명단 자체 (SSOT 는 wiki_sync.md 의 ## MD_FILES 섹션;
#     추가는 wiki_registry_sync 가 자동 append, 삭제는 사람).

on:
  push:
    branches: [main]
    paths:
      - '*.md'
      - '.github/workflows/wiki-sync.yml'
  workflow_dispatch:

# wiki push에 contents: write 필요. 이 워크플로는 main을 절대 건드리지 않음(아래 스크립트가 작업 디렉터리를 wiki/로만 한정).
permissions:
  contents: write

concurrency:
  group: wiki-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: checkout main (source)
        uses: actions/checkout@v4
        with:
          path: source

      - name: clone wiki (writable)
        run: |
          set -euo pipefail
          git config --global user.name  "wiki-sync-bot"
          git config --global user.email "wiki-sync-bot@users.noreply.github.com"
          git clone --quiet --depth=1 \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.wiki.git" \
            wiki

      - name: sync (validate + overlay + commit + push)
        id: sync
        shell: bash
        env:
          COMMIT_MSG: "sync: mirror main → wiki (${{ github.sha }})"
        run: |
          set -euo pipefail
          # MD_FILES SSOT: source/wiki_sync.md 의 ## MD_FILES 섹션. 런타임에 파싱.
          readarray -t MD_FILES < <(
            awk '/^## MD_FILES/{flag=1; next} /^## /{flag=0} flag && /^- /' source/wiki_sync.md \
              | grep -oE '[A-Za-z_][A-Za-z0-9_.]*\.md'
          )
          if [ ${#MD_FILES[@]} -eq 0 ]; then
            echo "::error::no entries parsed from source/wiki_sync.md ## MD_FILES"
            exit 1
          fi

          # 1) validate — source에 명단의 모든 파일이 존재해야 함.
          MISSING=()
          for f in "${MD_FILES[@]}"; do
            [ -f "source/$f" ] || MISSING+=("$f")
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::missing in source: ${MISSING[*]}"
            exit 1
          fi

          # 2) overlay — source → wiki, with three target-platform link adapters (순서 중요):
          #   (a) `.ko.md` 상대링크 → 절대 github.com URL (main 브랜치).
          #       .ko.md 형제는 위키에 미러링하지 않는다(사이드바를 EN-only 로 유지).
          #       페이지 상단의 [한국어](X.ko.md) 토글은 절대 URL 로 다시 써서 소스 리포에서 렌더된
          #       마크다운으로 빠진다. 이 규칙은 (b) 보다 먼저 실행되어야 한다 — 그렇지 않으면
          #       generic `.md`-strip 규칙이 먼저 `.md` 를 먹어버려 `](X.ko)` 가 남는다.
          #   (b) `.md` 확장자 제거: GitHub wiki 는 [text](Foo.md) 를 raw 파일로 라우팅하므로
          #       [text](Foo) / [text](Foo#anchor) 로 다시 쓴다.
          #       외부 URL 은 group 이 '/' ':'를 포함하지 않아 매치 안 됨.
          #   (c) `.github/` 상대경로 → 절대 github.com URL: 소스 뷰에서는 [x](.github/workflows/y.yml)
          #       이 동작하지만, 위키 베이스 URL 에서는 .github/ 서브트리가 없어 깨진다.
          #       절대 github.com URL 로 다시 쓰면 양쪽에서 동작.
          REPO="${{ github.repository }}"
          for f in "${MD_FILES[@]}"; do
            sed -E \
              -e "s|\]\(([^)/:#]+)\.ko\.md(#[^)]*)?\)|](https://github.com/${REPO}/blob/main/\1.ko.md\2)|g" \
              -e 's|\]\(([^)/:#]+)\.md(#[^)]*)?\)|](\1\2)|g' \
              -e "s|\]\(\.github/([^)]+)\)|](https://github.com/${REPO}/blob/main/.github/\1)|g" \
              "source/$f" > "wiki/$f"
          done

          # 3) stage + 4) lazy gate.
          cd wiki
          git add -- "${MD_FILES[@]}"
          if git diff --cached --quiet; then
            echo "result=skip" >> "$GITHUB_OUTPUT"
            echo "RESULT: skip (no changes)"
            exit 0
          fi

          # 5) commit + 6) push.
          git commit -m "$COMMIT_MSG"
          git push origin master
          SHA=$(git rev-parse HEAD)
          echo "result=pushed" >> "$GITHUB_OUTPUT"
          echo "wiki_sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "RESULT: pushed $SHA"

      - name: job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Wiki Sync"
            echo ""
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Source commit: \`${{ github.sha }}\`"
            echo "- Result: \`${{ steps.sync.outputs.result || 'failed' }}\`"
            if [ -n "${{ steps.sync.outputs.wiki_sha }}" ]; then
              echo "- Wiki HEAD: \`${{ steps.sync.outputs.wiki_sha }}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
