name: wiki-sync

# main → wiki 단방향 동기화. 결정론적 bash로 구현 (LLM 없음).
#
# 이 yaml의 책임:
#   - trigger 정의
#   - source/wiki 체크아웃
#   - lazy gate (diff 없으면 sync 스킵)
#   - overlay + commit + push
#   - 결정 로그를 job summary로 노출
# 이 yaml의 비책임:
#   - MD_FILES와 wiki_sync.md 간 일치 (사람 책임).

on:
  push:
    branches: [main]
    paths:
      - '*.md'
      - '.github/workflows/wiki-sync.yml'
  workflow_dispatch:

# wiki push에 contents: write 필요. 이 워크플로는 main을 절대 건드리지 않음(아래 스크립트가 작업 디렉터리를 wiki/로만 한정).
permissions:
  contents: write

concurrency:
  group: wiki-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: checkout main (source)
        uses: actions/checkout@v4
        with:
          path: source

      - name: clone wiki (writable)
        run: |
          set -euo pipefail
          git config --global user.name  "wiki-sync-bot"
          git config --global user.email "wiki-sync-bot@users.noreply.github.com"
          git clone --quiet --depth=1 \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.wiki.git" \
            wiki

      - name: sync (validate + overlay + commit + push)
        id: sync
        shell: bash
        env:
          COMMIT_MSG: "sync: mirror main → wiki (${{ github.sha }})"
        run: |
          set -euo pipefail
          # MD_FILES는 wiki_sync.md의 ## Implementation 섹션과 정확히 일치해야 한다 (사람 책임).
          MD_FILES=(
            Home.md
            task_principle.md
            agent_skill_principle.md
            wiki_sync.md
            spec_sync.md
            forge_pr_review.md
            wiki_e2e.md
            ux_agent.md
            test_agent.md
            ci_trigger.md
            Home.ko.md
            task_principle.ko.md
            agent_skill_principle.ko.md
            wiki_sync.ko.md
            spec_sync.ko.md
            forge_pr_review.ko.md
            wiki_e2e.ko.md
            ux_agent.ko.md
            test_agent.ko.md
            ci_trigger.ko.md
          )

          # 1) validate — source에 명단의 모든 파일이 존재해야 함.
          MISSING=()
          for f in "${MD_FILES[@]}"; do
            [ -f "source/$f" ] || MISSING+=("$f")
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::missing in source: ${MISSING[*]}"
            exit 1
          fi

          # 2) overlay — source → wiki, with two target-platform link adapters:
          #   (a) `.md` 확장자 제거: GitHub wiki 는 [text](Foo.md) 를 raw 파일로 라우팅하므로
          #       [text](Foo) / [text](Foo#anchor) 로 다시 쓴다.
          #       외부 URL 은 group 이 '/' ':'를 포함하지 않아 매치 안 됨.
          #   (b) `.github/` 상대경로 → 절대 github.com URL: 소스 뷰에서는 [x](.github/workflows/y.yml)
          #       이 동작하지만, 위키 베이스 URL 에서는 .github/ 서브트리가 없어 깨진다.
          #       절대 github.com URL 로 다시 쓰면 양쪽에서 동작.
          REPO="${{ github.repository }}"
          for f in "${MD_FILES[@]}"; do
            sed -E \
              -e 's|\]\(([^)/:#]+)\.md(#[^)]*)?\)|](\1\2)|g' \
              -e "s|\]\(\.github/([^)]+)\)|](https://github.com/${REPO}/blob/main/.github/\1)|g" \
              "source/$f" > "wiki/$f"
          done

          # 3) stage + 4) lazy gate.
          cd wiki
          git add -- "${MD_FILES[@]}"
          if git diff --cached --quiet; then
            echo "result=skip" >> "$GITHUB_OUTPUT"
            echo "RESULT: skip (no changes)"
            exit 0
          fi

          # 5) commit + 6) push.
          git commit -m "$COMMIT_MSG"
          git push origin master
          SHA=$(git rev-parse HEAD)
          echo "result=pushed" >> "$GITHUB_OUTPUT"
          echo "wiki_sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "RESULT: pushed $SHA"

      - name: job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Wiki Sync"
            echo ""
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Source commit: \`${{ github.sha }}\`"
            echo "- Result: \`${{ steps.sync.outputs.result || 'failed' }}\`"
            if [ -n "${{ steps.sync.outputs.wiki_sha }}" ]; then
              echo "- Wiki HEAD: \`${{ steps.sync.outputs.wiki_sha }}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
